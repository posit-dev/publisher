name: Nightly
on:
  schedule:
    - cron: "0 06 * * *"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  agent:
    uses: ./.github/workflows/agent.yaml
  build:
    uses: ./.github/workflows/build.yaml
  package:
    needs: build
    uses: ./.github/workflows/package.yaml
  e2e:
    needs: [package]
    uses: ./.github/workflows/e2e.yaml
    secrets:
      CONNECT_LICENSE: ${{ secrets.CONNECT_LICENSE }}
      CONNECT_LICENSE_FILE: ${{ secrets.CONNECT_LICENSE_FILE }}
      WORKBENCH_LICENSE: ${{ secrets.WORKBENCH_LICENSE }}
      GH_DOWNLOAD_TOKEN: ${{ secrets.GH_DOWNLOAD_TOKEN }}
      PCC_USER_CCQA3: ${{ secrets.PCC_USER_CCQA3 }}

  # Extensions
  vscode:
    uses: ./.github/workflows/vscode.yaml
  extension-contract-tests:
    uses: ./.github/workflows/extension-contract-tests.yaml

  connect-contract-tests:
    uses: ./.github/workflows/connect-contract-tests.yaml

  # Slack notification on failure
  slack-notification:
    needs:
      [
        agent,
        build,
        package,
        e2e,
        vscode,
        extension-contract-tests,
        connect-contract-tests,
      ]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack of nightly test failure
        uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            text: ":warning: Nightly tests failed"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: ":warning: *Nightly Tests Failed*\n\n*Repository:* ${{ github.repository }}\n*Workflow:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"

  # Slack notification when nightly tests recover from failure
  slack-notification-resolved:
    needs:
      [
        agent,
        build,
        package,
        e2e,
        vscode,
        extension-contract-tests,
        connect-contract-tests,
      ]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Check if previous run failed
        id: check-previous
        uses: actions/github-script@v8
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'nightly.yaml',
              per_page: 2,
              exclude_pull_requests: true
            });
            // Get the previous run (skip current run)
            const previousRuns = runs.data.workflow_runs.filter(run => run.id !== context.runId);
            if (previousRuns.length > 0) {
              const previousRun = previousRuns[0];
              console.log(`Previous run conclusion: ${previousRun.conclusion}`);
              return previousRun.conclusion === 'failure';
            }
            return false;
          result-encoding: string
      - name: Notify Slack of nightly test recovery
        if: steps.check-previous.outputs.result == 'true'
        uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            text: ":white_check_mark: Nightly tests recovered"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: ":white_check_mark: *Nightly Tests Recovered*\n\n*Repository:* ${{ github.repository }}\n*Workflow:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
