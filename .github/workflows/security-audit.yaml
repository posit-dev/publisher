name: Security Audit
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  audit:
    name: Audit GitHub Actions Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run security audit
        run: python scripts/audit_gha_security.py
