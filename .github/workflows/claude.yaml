name: Claude PR Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude-code-action:
    # NOTE: contains() is a substring match, so '@claude' will also match
    # usernames like '@claudesmith'. This is a known limitation of GitHub
    # Actions expressions which do not support regex word-boundary matching.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Generate token for GitHub App
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: 1129585
          private-key: ${{ secrets.POSIT_CONNECT_PROJECTS_PEM }}
          permission-actions: read
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write
          owner: posit-dev
          repositories: publisher

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ steps.generate-token.outputs.token }}

      - name: Sanitize role session name
        id: session-name
        env:
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
        run: |
          echo "value=$(echo "${TRIGGERING_ACTOR}" | sed 's/[^a-zA-Z0-9_+=,.@-]/_/g')" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.CLAUDE_CODE_AWS_ROLE_ARN }}
          role-session-name: ${{ steps.session-name.outputs.value }}
          aws-region: us-east-2

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: true
          show_full_output: true
          github_token: ${{ steps.generate-token.outputs.token }}
          branch_prefix: "claude-"
          additional_permissions: "actions: read"
          allowed_bots: "posit-connect-projects[bot]"
          prompt: |
            You are a helpful AI assistant for code reviews and issue triage.
            Respond to comments and issues that mention you with relevant code suggestions or triage actions.
            If you cannot assist, politely inform the user. In your responses, don't be overly complimentary.
            Stick to the facts and provide actionable advice.
          claude_args: |
            --model us.anthropic.claude-opus-4-6-v1
            --fallback-model us.anthropic.claude-haiku-4-5-20251001-v1:0
            --allowedTools Bash,Read,Write,Edit,WebFetch,WebSearch,mcp__github__create_pull_request,mcp__github__create_issue,mcp__github__search_issues,mcp__github__update_issue,mcp__github__create_pending_pull_request_review,mcp__github__add_pull_request_review_comment_to_pending_review,mcp__github__submit_pending_pull_request_review,mcp__github__get_pull_request_diff
