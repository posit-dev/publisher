name: Extension-API-Contracts
on: [workflow_call]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test/extension-api-contracts
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "test/extension-api-contracts/package-lock.json"
      - run: npm ci
      - run: npm test
      - run: npm run check:conformance
