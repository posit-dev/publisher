name: Release
on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"
permissions:
  contents: write # Required to create GitHub releases
  id-token: write # Required for AWS OIDC authentication in upload workflow
jobs:
  # Security: Verify the tag points to a commit on main branch
  verify-tag:
    name: Verify tag is on main branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/verify-tag-ancestry
  build:
    needs: verify-tag
    uses: ./.github/workflows/build.yaml
  package:
    needs:
      - build
    uses: ./.github/workflows/package.yaml
  archive:
    needs:
      - build
    uses: ./.github/workflows/archive.yaml
  upload:
    needs:
      - archive
      - package
    uses: ./.github/workflows/upload.yaml
    secrets:
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
  release:
    runs-on: ubuntu-latest
    needs:
      - archive
      - package
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: extractions/setup-just@v3
      - uses: actions/download-artifact@v8
        with:
          name: archives
          path: archives
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - id: get-prerelease
        run: echo "prerelease=$(just pre-release)" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ steps.get-prerelease.outputs.prerelease == 'true' }}
          files: |
            archives/**/*
            dist/**/*
  # Slack notification on failure
  slack-notification:
    needs:
      [
        verify-tag,
        build,
        package,
        archive,
        upload,
        release,
      ]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack of Release failure
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            text: ":x: Release failed for ${{ github.ref_name }}"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: ":x: *Release Failed for ${{ github.ref_name }}*\n\n*Repository:* ${{ github.repository }}\n*Tag:* `${{ github.ref_name }}`\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Workflow:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"

  # Slack notification when Release recovers from failure
  slack-notification-resolved:
    needs:
      [
        verify-tag,
        build,
        package,
        archive,
        upload,
        release,
      ]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Check if previous run failed
        id: check-previous
        uses: actions/github-script@v8
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yaml',
              per_page: 2,
              exclude_pull_requests: true
            });
            // Get the previous run (skip current run)
            const previousRuns = runs.data.workflow_runs.filter(run => run.id !== context.runId);
            if (previousRuns.length > 0) {
              const previousRun = previousRuns[0];
              console.log(`Previous run conclusion: ${previousRun.conclusion}`);
              return previousRun.conclusion === 'failure';
            }
            return false;
          result-encoding: string
      - name: Notify Slack of Release recovery
        if: steps.check-previous.outputs.result == 'true'
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            text: ":white_check_mark: Release recovered for ${{ github.ref_name }}"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: ":white_check_mark: *Release Recovered for ${{ github.ref_name }}*\n\n*Repository:* ${{ github.repository }}\n*Tag:* `${{ github.ref_name }}`\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Workflow:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"

  notify-slack:
    runs-on: ubuntu-latest
    needs:
      - release
    if: success()
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_PUBLISHER }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Posit Publisher ${{ github.ref_name }} Released",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "A new version of Posit Publisher has been released."
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Release"
                      },
                      "url": "https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Changelog"
                      },
                      "url": "https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md"
                    }
                  ]
                }
              ]
            }
