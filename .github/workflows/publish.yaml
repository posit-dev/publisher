name: Publish Extension
on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"
permissions:
  contents: read
jobs:
  # Security: Verify the tag points to a commit on main branch
  verify-tag:
    name: Verify tag is on main branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/verify-tag-ancestry
  package:
    needs: verify-tag
    uses: ./.github/workflows/package.yaml
  publish-vscode-marketplace:
    needs:
      - package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: extractions/setup-just@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - id: get-extension-path
        run: |
          name="$(jq -r .name extensions/vscode/package.json)"
          echo "extension_path=dist/${name}-$(just version).vsix" >> "$GITHUB_OUTPUT"

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          EXTENSION_FILE: ${{ steps.get-extension-path.outputs.extension_path }}
        run: |
          set -euo pipefail
          if [[ ! -f "$EXTENSION_FILE" ]]; then
            echo "::error::extensionFile not found at: $EXTENSION_FILE"
            exit 1
          fi
          npx --yes @vscode/vsce@2 publish --packagePath "$EXTENSION_FILE" --skip-duplicate

  publish-open-vsx:
    needs:
      - package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: extractions/setup-just@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - id: get-extension-path
        run: |
          name="$(jq -r .name extensions/vscode/package.json)"
          echo "extension_path=dist/${name}-$(just version).vsix" >> "$GITHUB_OUTPUT"

      - name: Publish to Open VSX Registry
        env:
          OVSX_PAT: ${{ secrets.OPEN_VSX_TOKEN }}
          EXTENSION_FILE: ${{ steps.get-extension-path.outputs.extension_path }}
        run: |
          set -euo pipefail
          if [[ ! -f "$EXTENSION_FILE" ]]; then
            echo "::error::extensionFile not found at: $EXTENSION_FILE"
            exit 1
          fi
          npx --yes ovsx@0 publish "$EXTENSION_FILE" --skip-duplicate
