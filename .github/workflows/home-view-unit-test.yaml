name: Unit-Test
on: [workflow_call]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/vscode/webviews/homeView
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "package-lock.json"
      - run: npm ci
        working-directory: ${{ github.workspace }}
      - run: npm test
