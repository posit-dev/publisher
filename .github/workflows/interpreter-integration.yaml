name: Interpreter Integration Tests
on: [workflow_call]
permissions:
  contents: read
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Python-only configurations
          - runner: ubuntu-latest
            python-version: "3.9"
            r-version: ""
          - runner: ubuntu-latest
            python-version: "3.10"
            r-version: ""
          - runner: ubuntu-latest
            python-version: "3.11"
            r-version: ""
          - runner: ubuntu-latest
            python-version: "3.12"
            r-version: ""
          - runner: ubuntu-latest
            python-version: "3.13"
            r-version: ""
          # R-only configurations
          - runner: ubuntu-latest
            python-version: ""
            r-version: "4.1"
          - runner: ubuntu-latest
            python-version: ""
            r-version: "4.3"
          - runner: ubuntu-latest
            python-version: ""
            r-version: "4.4"
          # Combined Python + R
          - runner: ubuntu-latest
            python-version: "3.11"
            r-version: "4.3"
          - runner: ubuntu-latest
            python-version: "3.12"
            r-version: "4.4"
          # macOS
          - runner: macos-latest
            python-version: "3.12"
            r-version: "4.4"
          # Windows
          - runner: windows-latest
            python-version: "3.12"
            r-version: "4.4"
    runs-on: ${{ matrix.runner }}
    name: >-
      ${{ matrix.runner }}
      ${{ matrix.python-version && format('py{0}', matrix.python-version) || '' }}
      ${{ matrix.r-version && format('R{0}', matrix.r-version) || '' }}
    defaults:
      run:
        working-directory: extensions/vscode
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
      - uses: actions/setup-python@v6
        if: matrix.python-version != ''
        with:
          python-version: ${{ matrix.python-version }}
      - uses: r-lib/actions/setup-r@v2
        if: matrix.r-version != ''
        with:
          r-version: ${{ matrix.r-version }}
      - name: Install renv
        if: matrix.r-version != ''
        run: Rscript -e "install.packages('renv', repos = 'https://cloud.r-project.org')"
      - run: npm install
      - run: npm run test-integration-interpreters
