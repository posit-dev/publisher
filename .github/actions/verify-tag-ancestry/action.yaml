name: Verify Tag Ancestry
description: Verify that the triggering tag points to a commit on main or a release branch

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Verify tag points to commit on main or a release branch
      shell: bash
      run: |
        git fetch origin main
        if git merge-base --is-ancestor ${{ github.sha }} origin/main; then
          echo "✅ Verified: Tag points to commit on main branch"
          exit 0
        fi

        # For patch releases, allow tags on release/v* branches
        TAG_NAME="${GITHUB_REF_NAME}"
        RELEASE_BRANCH="release/${TAG_NAME}"
        git fetch origin "$RELEASE_BRANCH" 2>/dev/null || true
        if git rev-parse "origin/$RELEASE_BRANCH" >/dev/null 2>&1 && \
           git merge-base --is-ancestor ${{ github.sha }} "origin/$RELEASE_BRANCH"; then
          echo "✅ Verified: Tag points to commit on release branch $RELEASE_BRANCH"
          exit 0
        fi

        echo "::error::Tag must point to a commit on main or a release/v* branch."
        exit 1
